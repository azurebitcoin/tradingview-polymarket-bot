upstream tv_polymarket_bot {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name grant-browser-online.grant-browser-hub-a80397.workers.dev;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name grant-browser-online.grant-browser-hub-a80397.workers.dev;

    ssl_certificate /etc/letsencrypt/live/grant-browser-online.grant-browser-hub-a80397.workers.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grant-browser-online.grant-browser-hub-a80397.workers.dev/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:TLSCache:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 256k;

    access_log /var/log/nginx/tv-polymarket-bot.access.log;
    error_log /var/log/nginx/tv-polymarket-bot.error.log warn;

    location / {
        proxy_pass http://tv_polymarket_bot;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 15s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
    }
}
